<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="NOEXCUSE Combo Rush – Mini Game von Riber Shamo Elias.">
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#030303">
  <link rel="icon" type="image/png" href="noexcuse_logo_v1.1.png">
  <title>COMBO RUSH · NOEXCUSE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #ff1f1f;
      --red-dark: #b80f0f;
      --bg: #030303;
      --border: rgba(255,255,255,0.18);
      --muted: rgba(255,255,255,0.55);
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: #fff;
      font-family: "Inter", sans-serif;
      overflow: hidden;
      overscroll-behavior: none;
    }

    /* ── Background ── */
    #bg {
      position: fixed; inset: 0; z-index: 0;
      background: url('img/bg.png') center/cover no-repeat;
      filter: brightness(0.14);
      pointer-events: none;
    }
    #bg-glow {
      position: fixed; inset: 0; z-index: 1;
      background: radial-gradient(circle at 50% 40%, rgba(255,31,31,0.1) 0%, transparent 65%);
      pointer-events: none;
      transition: opacity 0.4s;
    }

    /* ── Arena ── */
    #arena {
      position: fixed; inset: 0; z-index: 2;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      overflow: hidden;
    }

    /* ── Back link ── */
    #back-link {
      position: absolute; top: 18px; left: 20px; z-index: 50;
      display: flex; align-items: center; gap: 6px;
      color: rgba(255,255,255,0.25);
      text-decoration: none;
      font-size: 0.6rem; font-weight: 900;
      letter-spacing: 1.8px; text-transform: uppercase;
      transition: color .2s;
    }
    #back-link:hover { color: rgba(255,255,255,0.55); }

    /* ── Screens ── */
    .screen {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px; padding: 32px 24px;
      text-align: center;
      opacity: 0; pointer-events: none;
      transition: opacity .3s ease;
    }
    .screen.visible { opacity: 1; pointer-events: auto; }

    .game-kicker {
      font-size: 0.62rem; font-weight: 900;
      letter-spacing: 3.5px; text-transform: uppercase;
      color: var(--red);
    }

    .game-title {
      font-family: "Bebas Neue", sans-serif;
      font-size: clamp(4rem, 18vw, 8rem);
      line-height: .88;
      letter-spacing: 1px;
      background: linear-gradient(to bottom, #fff 35%, #444);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .game-desc {
      color: var(--muted); font-size: .85rem;
      max-width: 300px; line-height: 1.6;
    }

    .hs-box {
      padding: 12px 28px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      background: rgba(255,255,255,0.04);
      display: flex; flex-direction: column; align-items: center; gap: 3px;
    }
    .hs-label { font-size: .58rem; font-weight: 900; letter-spacing: 2.5px; text-transform: uppercase; color: rgba(255,255,255,0.3); }
    .hs-val { font-family: "Bebas Neue", sans-serif; font-size: 2.4rem; line-height: 1; color: #fff; }

    .btn {
      min-height: 54px; padding: 0 40px;
      border: none; border-radius: 999px;
      background: var(--red); color: #fff;
      font-family: "Bebas Neue", sans-serif;
      font-size: 1.35rem; letter-spacing: 2px;
      cursor: pointer;
      transition: transform .15s ease, background .15s ease;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .btn:hover { background: var(--red-dark); transform: scale(1.04); }
    .btn:active { transform: scale(.96); }

    /* Countdown */
    #countdown-num {
      font-family: "Bebas Neue", sans-serif;
      font-size: clamp(9rem, 32vw, 16rem);
      line-height: 1;
      background: linear-gradient(to bottom, #fff 30%, #333);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: cPulse .8s ease-in-out;
    }
    @keyframes cPulse {
      0%   { transform: scale(1.5); opacity: 0; }
      25%  { transform: scale(1);   opacity: 1; }
      75%  { transform: scale(1);   opacity: 1; }
      100% { transform: scale(.75); opacity: 0; }
    }

    /* ── HUD ── */
    #hud {
      position: absolute; top: 0; left: 0; right: 0; z-index: 30;
      padding: 16px 20px 0;
      display: none; flex-direction: column; gap: 6px;
      pointer-events: none;
    }
    #hud.visible { display: flex; }

    .hud-row { display: flex; align-items: center; gap: 14px; }

    #hud-score {
      font-family: "Bebas Neue", sans-serif;
      font-size: 2.4rem; line-height: 1; color: #fff;
      min-width: 70px; transition: transform .1s ease;
    }
    #hud-score.pop { animation: scorePop .15s ease-out; }
    @keyframes scorePop { 0%,100% { transform: scale(1); } 50% { transform: scale(1.18); } }

    .timer-track {
      flex: 1; height: 5px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px; overflow: hidden;
    }
    #timer-bar {
      height: 100%; width: 100%; border-radius: 3px;
      background: var(--red);
      transition: width .08s linear, background .5s ease;
    }

    #hud-combo {
      height: 18px; text-align: center;
      font-size: .72rem; font-weight: 900;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--red);
      transition: opacity .2s;
    }

    /* ── Targets ── */
    .t {
      position: absolute;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; touch-action: none;
      -webkit-tap-highlight-color: transparent;
      transform: translate(-50%, -50%) scale(0);
      animation: tSpawn .18s cubic-bezier(.2,1.6,.4,1) forwards;
      will-change: transform;
    }
    @keyframes tSpawn {
      to { transform: translate(-50%, -50%) scale(1); }
    }

    .t-inner {
      position: relative; width: 100%; height: 100%;
      border-radius: 50%; display: flex;
      align-items: center; justify-content: center;
      font-family: "Bebas Neue", sans-serif;
      font-size: .9rem; letter-spacing: .5px;
    }

    /* Ring SVG */
    .t-svg {
      position: absolute; inset: -7px;
      width: calc(100% + 14px); height: calc(100% + 14px);
      pointer-events: none; transform: rotate(-90deg);
    }
    .t-ring { fill: none; stroke-linecap: round; }

    /* Type A — red */
    .ta { background: rgba(255,31,31,.14); border: 2px solid rgba(255,31,31,.55); }
    .ta .t-inner { color: rgba(255,80,80,.95); }
    .ta .t-ring  { stroke: rgba(255,31,31,.65); }

    /* Type B — white */
    .tb { background: rgba(255,255,255,.07); border: 2px solid rgba(255,255,255,.42); }
    .tb .t-inner { color: rgba(255,255,255,.88); }
    .tb .t-ring  { stroke: rgba(255,255,255,.5); }

    /* Type C — gold */
    .tc { background: rgba(255,195,0,.1); border: 2px solid rgba(255,195,0,.6); }
    .tc .t-inner { color: rgba(255,210,0,1); }
    .tc .t-ring  { stroke: rgba(255,195,0,.7); }

    /* ── Effects ── */
    .fx-hit {
      position: absolute; border-radius: 50%; border: 2.5px solid;
      pointer-events: none; transform: translate(-50%,-50%) scale(.8);
      animation: fxHit .35s ease-out forwards;
    }
    @keyframes fxHit {
      to { transform: translate(-50%,-50%) scale(2.4); opacity: 0; }
    }

    .fx-miss {
      position: absolute; border-radius: 50%;
      background: rgba(255,31,31,.25);
      pointer-events: none; transform: translate(-50%,-50%);
      animation: fxMiss .4s ease-out forwards;
    }
    @keyframes fxMiss {
      to { transform: translate(-50%,-50%) scale(1.9); opacity: 0; }
    }

    .fx-pts {
      position: absolute; pointer-events: none;
      transform: translate(-50%,-50%);
      font-family: "Bebas Neue", sans-serif;
      font-size: 1.7rem; z-index: 40;
      text-shadow: 0 2px 10px rgba(0,0,0,.9);
      animation: fxPts .65s ease-out forwards;
    }
    @keyframes fxPts {
      0%   { opacity: 1; transform: translate(-50%,-50%) scale(1.1); }
      60%  { opacity: 1; transform: translate(-50%, calc(-50% - 44px)) scale(1); }
      100% { opacity: 0; transform: translate(-50%, calc(-50% - 72px)) scale(.8); }
    }

    /* ── Combo burst ── */
    #burst {
      position: absolute; inset: 0; z-index: 35;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none; opacity: 0;
    }
    #burst.go { animation: burstFade .55s ease-out forwards; }
    @keyframes burstFade { 0% { opacity: 1; } 100% { opacity: 0; } }

    #burst-txt {
      font-family: "Bebas Neue", sans-serif;
      font-size: clamp(2.5rem, 11vw, 5.5rem);
      letter-spacing: 4px; color: var(--red);
      text-shadow: 0 0 50px rgba(255,31,31,.55);
    }

    /* ── Game Over ── */
    .result-score {
      font-family: "Bebas Neue", sans-serif;
      font-size: clamp(5.5rem, 22vw, 11rem);
      line-height: .88;
      background: linear-gradient(to bottom, #fff 30%, #444);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .new-rec {
      font-size: .62rem; font-weight: 900;
      letter-spacing: 3px; text-transform: uppercase;
      color: var(--red); display: none;
    }
    .new-rec.on { display: block; }

    /* instructions grid */
    .inst-grid {
      display: grid; grid-template-columns: repeat(3,1fr);
      gap: 10px; max-width: 320px; width: 100%;
    }
    .inst-cell {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      padding: 12px 8px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      background: rgba(255,255,255,0.03);
    }
    .inst-dot {
      width: 30px; height: 30px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: "Bebas Neue", sans-serif; font-size: .8rem;
    }
    .inst-dot.a { background: rgba(255,31,31,.18); border: 1.5px solid rgba(255,31,31,.5); color: rgba(255,80,80,.95); }
    .inst-dot.b { background: rgba(255,255,255,.07); border: 1.5px solid rgba(255,255,255,.38); color: rgba(255,255,255,.88); }
    .inst-dot.c { background: rgba(255,195,0,.1); border: 1.5px solid rgba(255,195,0,.55); color: rgba(255,210,0,1); }
    .inst-label { font-size: .58rem; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; color: rgba(255,255,255,.35); }
    .inst-pts   { font-family: "Bebas Neue", sans-serif; font-size: 1rem; color: #fff; }
  </style>
</head>
<body>
  <div id="bg"></div>
  <div id="bg-glow"></div>

  <div id="arena">
    <!-- Back -->
    <a id="back-link" href=".">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      NOEXCUSE
    </a>

    <!-- HUD -->
    <div id="hud">
      <div class="hud-row">
        <div id="hud-score">0</div>
        <div class="timer-track"><div id="timer-bar"></div></div>
      </div>
      <div id="hud-combo"></div>
    </div>

    <!-- Combo burst -->
    <div id="burst"><span id="burst-txt"></span></div>

    <!-- START SCREEN -->
    <div class="screen visible" id="s-start">
      <div class="game-kicker">NOEXCUSE · Easter Egg</div>
      <div class="game-title">COMBO<br>RUSH</div>
      <div class="inst-grid">
        <div class="inst-cell">
          <div class="inst-dot a">+1</div>
          <div class="inst-label">Leicht</div>
          <div class="inst-pts">1 Pt</div>
        </div>
        <div class="inst-cell">
          <div class="inst-dot b">+2</div>
          <div class="inst-label">Mittel</div>
          <div class="inst-pts">2 Pt</div>
        </div>
        <div class="inst-cell">
          <div class="inst-dot c">+3</div>
          <div class="inst-label">Schnell</div>
          <div class="inst-pts">3 Pt</div>
        </div>
      </div>
      <div class="hs-box">
        <span class="hs-label">Highscore</span>
        <span class="hs-val" id="hs-start">0</span>
      </div>
      <button class="btn" id="btn-start">STARTEN</button>
    </div>

    <!-- COUNTDOWN SCREEN -->
    <div class="screen" id="s-count">
      <div id="countdown-num">3</div>
    </div>

    <!-- GAME OVER SCREEN -->
    <div class="screen" id="s-over">
      <div class="game-kicker">GAME OVER</div>
      <div class="result-score" id="res-score">0</div>
      <div class="new-rec" id="new-rec">NEW RECORD 🔥</div>
      <div class="hs-box">
        <span class="hs-label">Highscore</span>
        <span class="hs-val" id="hs-over">0</span>
      </div>
      <button class="btn" id="btn-retry">NOCHMAL</button>
    </div>
  </div>

<script>
// ── CONFIG ──────────────────────────────────────────────
const DURATION = 30000;
const TYPES = [
  { cls:'ta', sz:70, pts:1, life:2500, lbl:'+1' },
  { cls:'tb', sz:50, pts:2, life:1800, lbl:'+2' },
  { cls:'tc', sz:36, pts:3, life:1250, lbl:'+3' },
];
const COMBOS = [
  { at:3,  mult:2, txt:'COMBO ×2' },
  { at:7,  mult:3, txt:'ON FIRE ×3' },
  { at:12, mult:4, txt:'UNSTOPPABLE ×4' },
  { at:20, mult:5, txt:'NO EXCUSE ×5' },
];

// ── STATE ────────────────────────────────────────────────
let state='idle', score=0, combo=0, mult=1;
let t0=0, spawnTimer=null, tickTimer=null;
const targets = new Map(); // el → { type, clearId }
let audioCtx = null;

// ── ELEMENTS ─────────────────────────────────────────────
const arena   = document.getElementById('arena');
const hud     = document.getElementById('hud');
const hudScoreEl = document.getElementById('hud-score');
const hudComboEl = document.getElementById('hud-combo');
const timerBar   = document.getElementById('timer-bar');
const bgGlow     = document.getElementById('bg-glow');
const burstEl    = document.getElementById('burst');
const burstTxt   = document.getElementById('burst-txt');

const sStart = document.getElementById('s-start');
const sCount = document.getElementById('s-count');
const sOver  = document.getElementById('s-over');
const cntNum = document.getElementById('countdown-num');
const hsStart = document.getElementById('hs-start');
const hsOver  = document.getElementById('hs-over');
const resScore = document.getElementById('res-score');
const newRec   = document.getElementById('new-rec');

document.getElementById('btn-start').addEventListener('click', doCountdown);
document.getElementById('btn-retry').addEventListener('click', doCountdown);

// prevent page scroll during game
arena.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

// ── AUDIO ────────────────────────────────────────────────
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function beep(freq, dur, type='sine', vol=0.15, freqEnd=null) {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  const now = audioCtx.currentTime;
  o.type = type;
  o.frequency.setValueAtTime(freq, now);
  if (freqEnd) o.frequency.exponentialRampToValueAtTime(freqEnd, now + dur);
  g.gain.setValueAtTime(vol, now);
  g.gain.exponentialRampToValueAtTime(0.001, now + dur);
  o.start(now); o.stop(now + dur + 0.01);
}

function sndHit(i) {
  const freqs = [[220,110],[330,165],[550,275]];
  const types = ['sine','square','sawtooth'];
  beep(freqs[i][0], 0.12, types[i], 0.17, freqs[i][1]);
}
function sndMiss()    { beep(80, 0.18, 'sine', 0.09); }
function sndCombo()   { [440,550,660].forEach((f,i) => setTimeout(() => beep(f, 0.14, 'sine', 0.13), i*55)); }
function sndGameOver(){ [440,330,220,165].forEach((f,i) => setTimeout(() => beep(f, 0.17, 'sine', 0.13), i*100)); }

// ── HIGHSCORE ────────────────────────────────────────────
const HS_KEY = 'noexcuse-comboscore';
const getHs  = () => parseInt(localStorage.getItem(HS_KEY)||'0');
const saveHs = v => localStorage.setItem(HS_KEY, v);
function refreshHs() { const h=getHs(); hsStart.textContent=h; hsOver.textContent=h; }

// ── SCREENS ──────────────────────────────────────────────
function show(el) {
  [sStart, sCount, sOver].forEach(s => s.classList.remove('visible'));
  if (el) el.classList.add('visible');
}

// ── COUNTDOWN ────────────────────────────────────────────
function doCountdown() {
  ensureAudio();
  show(sCount);
  state = 'countdown';
  let n = 3;

  function tick() {
    cntNum.textContent = n;
    cntNum.style.animation = 'none';
    void cntNum.offsetWidth;
    cntNum.style.animation = '';
    if (n-- > 1) setTimeout(tick, 900);
    else setTimeout(() => {
      cntNum.textContent = 'GO!';
      cntNum.style.animation = 'none';
      void cntNum.offsetWidth;
      cntNum.style.animation = '';
      setTimeout(startGame, 650);
    }, 900);
  }
  tick();
}

// ── START GAME ───────────────────────────────────────────
function startGame() {
  clearAll();
  score=0; combo=0; mult=1; t0=performance.now();
  state='playing';

  show(null);
  hud.classList.add('visible');
  hudScoreEl.textContent='0';
  hudComboEl.textContent='';
  timerBar.style.width='100%';
  timerBar.style.background='var(--red)';
  bgGlow.style.opacity='1';

  scheduleSpawn();
  tickTimer = setInterval(gameTick, 60);
}

// ── SPAWN ─────────────────────────────────────────────────
function scheduleSpawn() {
  if (state !== 'playing') return;
  spawnOne();
  const elapsed = performance.now() - t0;
  const delay = Math.max(360, 920 - Math.floor(elapsed / 5000) * 70);
  spawnTimer = setTimeout(scheduleSpawn, delay);
}

function spawnOne() {
  if (state !== 'playing') return;

  // weighted type selection by progress
  const prog = Math.min(1, (performance.now()-t0) / DURATION);
  const r = Math.random();
  const ti = r < 0.52 - prog*0.18 ? 0 : r < 0.86 - prog*0.1 ? 1 : 2;
  const tp = TYPES[ti];

  // safe area
  const pad = tp.sz/2 + 32;
  const hudH = 84;
  const W = arena.clientWidth, H = arena.clientHeight;
  const x = pad + Math.random() * (W - pad*2);
  const y = hudH + pad + Math.random() * (H - hudH - pad*2);

  // avoid overlap
  for (const [el] of targets) {
    if (Math.hypot(x - parseFloat(el.style.left), y - parseFloat(el.style.top)) < tp.sz + 18) return;
  }

  const el = document.createElement('div');
  el.className = `t ${tp.cls}`;
  el.style.cssText = `width:${tp.sz}px;height:${tp.sz}px;left:${x}px;top:${y}px;`;

  // SVG ring
  const r2 = tp.sz/2 + 4;
  const circ = 2 * Math.PI * r2;
  const svgSize = tp.sz + 14;
  el.innerHTML = `
    <svg class="t-svg" viewBox="0 0 ${svgSize} ${svgSize}">
      <circle class="t-ring" cx="${svgSize/2}" cy="${svgSize/2}" r="${r2}"
        stroke-width="2.5" stroke-dasharray="${circ}" stroke-dashoffset="0"/>
    </svg>
    <div class="t-inner">${tp.lbl}</div>`;

  // animate ring countdown
  const ring = el.querySelector('.t-ring');
  ring.style.transition = `stroke-dashoffset ${tp.life}ms linear`;
  requestAnimationFrame(() => requestAnimationFrame(() => { ring.style.strokeDashoffset = circ; }));

  el.addEventListener('pointerdown', e => { e.preventDefault(); e.stopPropagation(); onHit(el, tp, x, y); }, { passive:false });
  arena.appendChild(el);

  const clearId = setTimeout(() => { if (targets.has(el)) onMiss(el, x, y, tp.sz); }, tp.life);
  targets.set(el, { tp, clearId });
}

// ── HIT ───────────────────────────────────────────────────
function onHit(el, tp, x, y) {
  if (!targets.has(el)) return;
  clearTimeout(targets.get(el).clearId);
  targets.delete(el);
  el.remove();

  // burst fx
  addFx('fx-hit', x, y, tp.sz, tp.cls === 'ta' ? 'rgba(255,31,31,.75)' : tp.cls === 'tc' ? 'rgba(255,195,0,.75)' : 'rgba(255,255,255,.6)');

  // combo & score
  combo++;
  checkCombo();
  const pts = tp.pts * mult;
  score += pts;
  hudScoreEl.textContent = score;
  hudScoreEl.classList.remove('pop');
  void hudScoreEl.offsetWidth;
  hudScoreEl.classList.add('pop');

  // pts popup
  const ptEl = document.createElement('div');
  ptEl.className = 'fx-pts';
  ptEl.style.cssText = `left:${x}px;top:${y}px;color:${mult>1?'var(--red)':'#fff'};${mult>1?'font-size:2.1rem;':''}`;
  ptEl.textContent = '+'+pts;
  arena.appendChild(ptEl);
  setTimeout(() => ptEl.remove(), 700);

  sndHit(TYPES.indexOf(tp));
  if (navigator.vibrate) navigator.vibrate(28);
}

// ── MISS ──────────────────────────────────────────────────
function onMiss(el, x, y, sz) {
  targets.delete(el);
  el.remove();
  addFx('fx-miss', x, y, sz, '');
  sndMiss();
  if (combo > 0) { combo=0; mult=1; hudComboEl.textContent=''; bgGlow.style.opacity='1'; }
}

// ── COMBO ─────────────────────────────────────────────────
function checkCombo() {
  let newMult = 1, txt = '';
  for (const c of COMBOS) { if (combo >= c.at) { newMult = c.mult; txt = c.txt; } }

  if (newMult > mult) {
    mult = newMult;
    fireBurst(txt);
    sndCombo();
    if (navigator.vibrate) navigator.vibrate([40,25,70]);
    bgGlow.style.opacity = String(Math.min(0.9, 0.4 + mult*0.15));
  }
  hudComboEl.textContent = combo >= 3 ? `×${mult} COMBO  (${combo} HITS)` : '';
}

function fireBurst(txt) {
  burstTxt.textContent = txt;
  burstEl.classList.remove('go');
  void burstEl.offsetWidth;
  burstEl.classList.add('go');
}

// ── FX HELPER ─────────────────────────────────────────────
function addFx(cls, x, y, sz, borderColor) {
  const el = document.createElement('div');
  el.className = cls;
  el.style.cssText = `left:${x}px;top:${y}px;width:${sz}px;height:${sz}px;${borderColor?'border-color:'+borderColor+';':''}`;
  arena.appendChild(el);
  setTimeout(() => el.remove(), 450);
}

// ── TICK ──────────────────────────────────────────────────
function gameTick() {
  const elapsed = performance.now() - t0;
  const pct = Math.max(0, 1 - elapsed / DURATION);
  timerBar.style.width = (pct * 100) + '%';
  timerBar.style.background = pct < .2 ? '#ff2020' : pct < .5 ? '#ff8800' : 'var(--red)';
  if (pct <= 0) endGame();
}

// ── END ───────────────────────────────────────────────────
function endGame() {
  if (state !== 'playing') return;
  state = 'over';
  clearInterval(tickTimer);
  clearTimeout(spawnTimer);
  clearAll();
  hud.classList.remove('visible');
  bgGlow.style.opacity = '1';

  sndGameOver();
  if (navigator.vibrate) navigator.vibrate([80, 40, 120]);

  const prev = getHs();
  const isNew = score > prev;
  if (isNew) saveHs(score);
  refreshHs();
  resScore.textContent = score;
  hsOver.textContent = isNew ? score : prev;
  newRec.classList.toggle('on', isNew);
  show(sOver);
}

// ── CLEAR ─────────────────────────────────────────────────
function clearAll() {
  for (const [el, { clearId }] of targets) { clearTimeout(clearId); el.remove(); }
  targets.clear();
  arena.querySelectorAll('.fx-pts,.fx-hit,.fx-miss').forEach(e => e.remove());
}

// Init
refreshHs();
</script>
