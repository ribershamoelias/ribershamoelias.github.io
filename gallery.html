<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NO EXCUSE | Gallery</title>

<style>
:root {
  --bg: #050505;
  --panel: #101010;
  --line: rgba(255,255,255,0.12);
  --text: #f6f4ef;
  --muted: #a7a39b;
  --red: #e11919;
}

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* HEADER */
.header {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 20px 40px;
  background: rgba(0,0,0,0.8);
  border-bottom: 1px solid var(--line);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.header a {
  color: var(--text);
  text-decoration: none;
  font-weight: 900;
}

/* MAIN */
.main {
  padding: 120px 40px;
  max-width: 1200px;
  margin: auto;
}

/* TITLE */
.title {
  margin-bottom: 40px;
}

.title h1 {
  font-size: 3rem;
  margin: 0;
}

.title p {
  color: var(--muted);
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
}

/* ITEM */
.item {
  position: relative;
  overflow: hidden;
  border: 1px solid var(--line);
  cursor: pointer;
  transition: 0.2s;
}

.item:hover {
  transform: scale(1.02);
}

.item img,
.item video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* OVERLAY */
.overlay {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 12px;
  background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
  font-size: 0.8rem;
  color: white;
}

/* INSTAGRAM BUTTON */
.instagram-link {
  margin-top: 40px;
  display: inline-block;
  padding: 14px 30px;
  background: var(--red);
  text-decoration: none;
  font-weight: 900;
  color: white;
}
</style>
</head>

<body>

<div class="header">
  <a href="../index.html">NO EXCUSE</a>
  <a href="https://instagram.com/YOUR_USERNAME" target="_blank">Instagram</a>
</div>

<div class="main">

  <div class="title">
    <h1>Training Gallery</h1>
  </div>

  <div class="grid">

    <!-- IMAGE -->
    <a href="https://www.instagram.com/p/DX4FmwmjQj5/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA==" target="_blank" class="item">
      <img src="img/rse_sidekick.png" alt="">
      <div class="overlay">Sidekick</div>
    </a>

    <!-- IMAGE -->
    <a href="https://www.instagram.com/p/DX4FmwmjQj5/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA==" target="_blank" class="item">
      <img src="img/rse_boxing.png" alt="">
      <div class="overlay">Boxing Session</div>
    </a>

  </div>

  <a href="https://instagram.com/ribershamoelias" target="_blank" class="instagram-link">
    View more on Instagram
  </a>

</div>

</body>
</html>
