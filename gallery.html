<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NOEXCUSE | Gallery</title>

<style>
:root {
  --bg: #050505;
  --panel: #101010;
  --line: rgba(255,255,255,0.12);
  --text: #f6f4ef;
  --muted: #a7a39b;
  --red: #e11919;
  --red-2: #ff3434;
  --ease: cubic-bezier(0.16, 1, 0.3, 1);
}

* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  background:
    radial-gradient(circle at 50% 0%, rgba(225, 25, 25, 0.14), transparent 34rem),
    linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px),
    linear-gradient(rgba(255,255,255,0.028) 1px, transparent 1px),
    var(--bg);
  background-size: auto, 64px 64px, 64px 64px;
  color: var(--text);
  font-family: 'Inter', sans-serif;
}

/* HEADER */
.site-header {
  position: fixed;
  top: 0;
  width: 100%;
  z-index: 20;
  min-height: 72px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 clamp(18px, 4vw, 42px);
  border-bottom: 1px solid var(--line);
  background: rgba(5,5,5,0.85);
  backdrop-filter: blur(18px);
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  color: var(--text);
  font-weight: 900;
  letter-spacing: 0.08em;
}

.brand img {
  width: 34px;
  height: 34px;
  background: #fff;
  border-radius: 4px;
}

.site-nav a {
  margin-left: 20px;
  text-decoration: none;
  color: var(--muted);
  font-size: 0.75rem;
  font-weight: 900;
  text-transform: uppercase;
}

/* MAIN */
.dashboard {
  padding: 120px 40px 60px;
  max-width: 1200px;
  margin: auto;
}

/* HERO */
.hero {
  margin-bottom: 40px;
}

.section-kicker {
  color: var(--red-2);
  font-size: 0.75rem;
  font-weight: 900;
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

.hero h1 {
  font-size: clamp(2.5rem, 5vw, 4rem);
  margin: 10px 0;
}

.hero p {
  color: var(--muted);
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 18px;
}

/* ITEM */
.item {
  position: relative;
  overflow: hidden;
  border: 1px solid var(--line);
  background: var(--panel);
  border-radius: 6px;
  transition: 0.25s var(--ease);
}

.item:hover {
  transform: translateY(-4px) scale(1.02);
  border-color: rgba(255,255,255,0.2);
}

/* MEDIA */
.item img,
.item video {
  width: 100%;
  height: 260px;
  object-fit: cover;
  display: block;
}

/* OVERLAY */
.overlay {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 14px;
  background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
  font-size: 0.8rem;
  font-weight: 600;
}

/* BUTTON */
.instagram-link {
  margin-top: 50px;
  display: inline-block;
  padding: 14px 28px;
  background: linear-gradient(135deg, var(--red), #5c0a0a);
  text-decoration: none;
  font-weight: 900;
  color: white;
  border-radius: 6px;
  transition: 0.2s;
}

.instagram-link:hover {
  transform: scale(1.05);
}

/* MOBILE */
@media (max-width: 900px) {
  .dashboard {
    padding: 120px 20px 60px;
  }
}

@media (max-width: 600px) {
  .brand span { display: none; }
}
</style>
</head>

<body>

<header class="site-header">
  <a class="brand" href="../index.html">
    <img src="../noexcuse_logo_v1.1.png" alt="">
    <span>NO EXCUSE</span>
  </a>

  <nav class="site-nav">
    <a href="../index.html">Home</a>
    <a href="https://instagram.com/ribershamoelias" target="_blank">Instagram</a>
  </nav>
</header>

<main class="dashboard">

  <!-- HERO -->
  <section class="hero">
    <span class="section-kicker">Training</span>
    <h1>Gallery</h1>
    <p>Your progress. No excuses.</p>
  </section>

  <!-- GRID -->
  <section class="grid">

    <!-- ITEM -->
    <a href="https://www.instagram.com/p/DX4FmwmjQj5/" target="_blank" class="item">
      <img src="img/rse_sidekick.png">
      <div class="overlay">Sidekick</div>
    </a>

    <!-- ITEM -->
    <a href="https://www.instagram.com/p/DX4FmwmjQj5/" target="_blank" class="item">
      <img src="img/rse_boxing.png">
      <div class="overlay">Boxing Session</div>
    </a>

    <!-- VIDEO EXAMPLE -->
    <div class="item">
      <video src="videos/training.mp4" autoplay muted loop></video>
      <div class="overlay">Training Clip</div>
    </div>

  </section>

  <!-- BUTTON -->
  <a href="https://instagram.com/ribershamoelias" target="_blank" class="instagram-link">
    View more on Instagram
  </a>

</main>

</body>
</html>
