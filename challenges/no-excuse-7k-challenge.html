<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="NO EXCUSE 7K Challenge - Strava Route 7.7km, 145m elevation. Active fitness challenge by Riber Shamo Elias, Hermeskeil.">\n  <meta name="keywords" content="no excuse 7k challenge, strava route 3486098432420950402, fitness hermeskeil, running challenge, riber shamo elias">\n  <title>NO EXCUSE 7K Challenge | Strava Route | Riber Shamo Elias</title>\n  <!-- Open Graph -->\n  <meta property="og:title" content="NO EXCUSE 7K Challenge">\n  <meta property="og:description" content="Active 7.7km Strava route challenge with 3D terrain. No excuses!">\n  <meta property="og:image" content="https://ribershamoelias.github.io/noexcuse_logo_v1.1.png">\n  <meta property="og:url" content="https://ribershamoelias.github.io/challenges/no-excuse-7k-challenge.html">\n  <!-- Twitter -->\n  <meta name="twitter:card" content="summary_large_image">\n  <meta name="twitter:title" content="NO EXCUSE 7K Challenge">\n  <meta name="twitter:description" content="7.7km Strava route - finish it!">\n  <link rel="canonical" href="https://ribershamoelias.github.io/challenges/no-excuse-7k-challenge.html">\n  <link rel="alternate" hreflang="de" href="https://ribershamoelias.github.io/challenges/no-excuse-7k-challenge.html">
  <style>
    :root {
      --bg: #050505;
      --panel: #101010;
      --line: rgba(255, 255, 255, 0.12);
      --text: #f6f4ef;
      --muted: #a7a39b;
      --red: #e11919;
      --red-2: #ff3434;
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 50% 0%, rgba(225, 25, 25, 0.14), transparent 34rem),
        linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px),
        linear-gradient(rgba(255,255,255,0.028) 1px, transparent 1px),
        var(--bg);
      background-size: auto, 64px 64px, 64px 64px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
    }

    .site-header {
      position: fixed;
      top: 0; width: 100%;
      z-index: 20;
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 clamp(18px, 4vw, 42px);
      border-bottom: 1px solid var(--line);
      background: rgba(5, 5, 5, 0.85);
      backdrop-filter: blur(18px);
    }

    .brand { 
      display: flex; 
      align-items: center; 
      gap: 11px; 
      text-decoration: none; 
      color: var(--text); 
      font-weight: 900; 
      letter-spacing: 0.08em; 
    }
    .brand img { width: 36px; height: 36px; background: #fff; border-radius: 4px; }
    .site-nav a { margin-left: 20px; text-decoration: none; color: var(--muted); font-size: 0.75rem; font-weight: 900; text-transform: uppercase; }

    /* Dashboard Layout */
    .dashboard {
      flex: 1;
      padding: 120px 40px 60px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .hero {
      margin-bottom: 40px;
    }

    .hero-left {
      /* Optional left alignment if needed */
    }

    .section-kicker {
      color: var(--red-2);
      font-size: 0.76rem;
      font-weight: 900;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .hero h1 {
      font-size: clamp(2.5rem, 5vw, 4rem);
      font-weight: 900;
      line-height: 0.95;
      margin: 10px 0;
    }

    .hero p {
      color: var(--muted);
      font-size: 1.1rem;
      max-width: 500px;
    }

    /* Hero Stat */
    .hero-stat {
      margin-top: 20px;
    }

    .hero-stat span {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    .hero-stat h2 {
      font-size: 2.5rem;
      margin-top: 6px;
    }

    /* Progress Bar */
    .progress {
      margin: 30px 0 50px;
    }

    .progress-track {
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.1);
      position: relative;
    }

    .progress-fill {
      position: relative;
      height: 100%;
      background: var(--red);
      width: 100%;
      border-radius: 2px;
    }

    .progress-value {
      position: absolute;
      right: 0;
      top: -22px;
      font-size: 0.7rem;
      color: var(--muted);
    }

    .progress-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1.5fr;
      gap: 18px;
    }

    .card {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: var(--panel);
      border: 1px solid var(--line);
      padding: 24px;
      border-radius: 6px;
      transition: 0.2s var(--ease);
      text-align: center;
    }

    .card:hover {
      transform: translateY(-4px) scale(1.01);
      border-color: rgba(255,255,255,0.2);
    }

    .card span {
      color: var(--muted);
      opacity: 0.7;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      display: block;
    }

    .card h2 {
      margin: 10px 0 0;
      font-size: 2.4rem;
      font-weight: 900;
      letter-spacing: 0.02em;
    }

    .card.highlight {
      background: linear-gradient(135deg, var(--red), #5c0a0a);
      box-shadow: 0 10px 40px rgba(225, 25, 25, 0.3);
      color: white;
      border-color: var(--red);
    }

    .card.map {
      grid-column: span 2;
      height: 420px;
      overflow: hidden;
      padding: 0;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px;
    }

    .card.map > div {
      width: 100%;
      height: 100%;
    }

    /* Mobile */
    @media (max-width: 900px) {
      .grid {
        grid-template-columns: 1fr;
        gap: 16px;
      }
      .card.map {
        grid-column: span 1;
        height: 350px;
      }
      .dashboard {
        padding: 120px 20px 60px;
      }
    }

    @media (max-width: 600px) {
      .brand span { display: none; }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <a class="brand" href="../index.html" aria-label="NO EXCUSE Home">
      <img src="noexcuse_logo_v1.1.png" alt="NO EXCUSE Logo">
      <span>NO EXCUSE</span>
    </a>
    <nav class="site-nav" aria-label="Page navigation">
      <a href="../index.html">Home</a>
      <a href="https://strava.com/athletes/132992758" target="_blank">Strava</a>
    </nav>
  </header>

  <main class="dashboard">

    <!-- TOP BAR -->
    <section class="hero">
      <div class="hero-left">
        <span class="section-kicker">Challenge #1</span>
        <h1>NO EXCUSE 7K</h1>
        <p>No shortcuts. Just consistency.</p>
        <div class="hero-stat">
          <span>Total Distance</span>
          <h2>7.7 KM</h2>
        </div>
      </div>
    </section>

    <!-- PROGRESS BAR -->
    <div class="progress">
      <div class="progress-track">
        <div class="progress-fill" style="width: 100%;">
          <span class="progress-value">100%</span>
        </div>
      </div>
      <div class="progress-labels">
        <span>START</span>
        <span>FINISH</span>
      </div>
    </div>

    <!-- GRID -->
    <section class="grid">

      <!-- STATS -->
      <div class="card">
        <span>Distance</span>
        <h2>7.7 KM</h2>
      </div>

      <div class="card">
        <span>Elevation</span>
        <h2>145 M</h2>
      </div>

      <div class="card highlight">
        <span>Status</span>
        <h2>ACTIVE</h2>
      </div>

      <div class="card">
        <span>Goal</span>
        <h2>Finish Route</h2>
      </div>

      <!-- STRAVA MAP -->
      <div class="card map">
        <div class="strava-embed-placeholder"
          data-embed-type="route"
          data-embed-id="3486098432420950402"
          data-style="standard"
          data-terrain="3d"
          data-surface-type="true"
          data-map-hash="12.08/49.66702/6.94681"
          data-from-embed="true"
          data-token="GrKUufNX7GRXMdTXiRKROB37zjIipo0sgKJktxS6n7I">
        </div>
      </div>

    </section>

  </main>

  <script src="https://strava-embeds.com/embed.js"></script>
</body>
</html>
