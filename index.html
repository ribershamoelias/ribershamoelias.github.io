<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSE Systems – Digitale Exzellenz (Im Aufbau)</title>
    <meta name="description" content="RSE Systems entwickelt maßgeschneiderte Softwarelösungen. Die Webseite befindet sich derzeit im Aufbau.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        /* Basis-Styles */
        :root {
            --color-primary: #007aff;
            --color-secondary: #0056b3;
            --color-dark: #1a1a1c;
            --color-light-gray: #f2f2f7;
            --color-white: #ffffff;
            --color-text-dark: #2c2c2e;
            --color-text-light: #8e8e93;
            --border-radius-md: 12px;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--color-light-gray);
            color: var(--color-text-dark);
        }
        
        /* ==================================== */
        /* Under Construction Overlay Styles    */
        /* ==================================== */
        .under-construction-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(242, 242, 247, 0.9); /* Heller, leicht transparenter Hintergrund */
            backdrop-filter: blur(10px);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .overlay-content {
            background-color: var(--color-white);
            border-radius: var(--border-radius-md);
            padding: 40px 50px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.12);
            max-width: 600px;
            width: 90%;
            border: 1px solid rgba(0, 0, 0, 0.08);
        }

        .overlay-content h2 {
            font-family: 'Inter', sans-serif;
            font-size: 2.5em;
            font-weight: 700;
            color: var(--color-dark);
            margin-bottom: 15px;
        }

        .overlay-content p {
            font-size: 1.1em;
            color: var(--color-text-light);
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .overlay-cta {
            background-color: var(--color-primary);
            color: var(--color-white);
            padding: 12px 25px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1em;
            transition: background-color 0.3s ease, transform 0.3s ease;
            display: inline-block;
        }

        .overlay-cta:hover {
            background-color: var(--color-secondary);
            transform: translateY(-2px);
        }

        /* NEUER BUTTON FÜR DAS SPIEL */
        .play-game-link {
            font-family: 'Inter', sans-serif;
            background: none;
            border: none;
            color: var(--color-primary);
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            padding: 10px;
            margin-top: 30px;
            display: inline-block;
            text-decoration: underline;
        }
        
        .play-game-link:hover {
            color: var(--color-secondary);
        }


        /* ==================================== */
        /* Tic-Tac-Toe Game Modal Styles        */
        /* ==================================== */
        .game-modal {
            display: none; /* Standardmäßig versteckt */
            position: fixed;
            z-index: 10000; /* Muss höher sein als der Overlay */
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Press Start 2P', cursive;
        }

        .game-modal-content {
            background-color: #2c2c2c;
            padding: 30px;
            border: 4px solid #fff;
            box-shadow: 0 0 0 4px #2c2c2c;
            position: relative;
            width: 90%;
            max-width: 420px;
            text-align: center;
        }

        .game-close-button {
            color: #fff;
            position: absolute;
            top: 5px;
            right: 15px;
            font-size: 32px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .game-close-button:hover,
        .game-close-button:focus {
            color: #ff4757;
        }

        .game-title {
            font-size: 2em;
            color: #54a0ff;
            margin-bottom: 20px;
            text-shadow: 2px 2px #000;
        }

        #gameStatus {
            font-size: 1.2em;
            color: #fff;
            margin-bottom: 25px;
            height: 40px;
            line-height: 1.4;
        }

        #ticTacToeBoard {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            width: 300px;
            height: 300px;
            margin: 0 auto 25px;
            background-color: #000;
            border: 4px solid #fff;
            gap: 4px;
        }

        .cell {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3.5em;
            background-color: #2c2c2c;
            cursor: pointer;
            transition: background-color 0.2s ease;
            user-select: none;
        }

        .cell:hover {
            background-color: #444;
        }

        .cell.x { color: #48dbfb; }
        .cell.o { color: #ff6b81; }

        .winning-cell {
            background-color: #feca57 !important;
            color: #2c2c2c;
        }

        .game-controls button {
            font-family: 'Press Start 2P', cursive;
            background-color: #54a0ff;
            color: #fff;
            border: 2px solid #fff;
            box-shadow: 2px 2px #000;
            padding: 10px 15px;
            margin: 5px;
            cursor: pointer;
            transition: all 0.15s ease;
            font-size: 0.8em;
        }

        .game-controls button:hover { background-color: #2e86de; }
        .game-controls button:active { transform: translateY(2px); box-shadow: none; }
        .game-controls button#resetGameBtn { background-color: #ff4757; }
        .game-controls button#resetGameBtn:hover { background-color: #eb4d4b; }
        
        #gameModeSelection { margin-bottom: 20px; }

        @media (max-width: 480px) {
            .overlay-content { padding: 30px 25px; }
            .game-modal-content { padding: 20px; }
            #ticTacToeBoard { width: 240px; height: 240px; }
            .cell { font-size: 2.8em; }
            .game-title { font-size: 1.5em; }
            #gameStatus { font-size: 1em; }
        }

    </style>
</head>
<body>
    
    <div class="under-construction-overlay">
        <div class="overlay-content">
            <h2>Wir bauen an Ihrer Zukunft!</h2>
            <p>Unsere Webseite wird derzeit für Sie überarbeitet. Für Anfragen erreichen Sie uns direkt per E-Mail:</p>
            <a href="mailto:info@rse-systems.com" class="overlay-cta">info@rse-systems.com</a>
            <br>
            <button id="playGameFromOverlayBtn" class="play-game-link">Keine Lust zu warten? Ein Spielchen wagen!</button>
        </div>
    </div>

    <div id="gameModal" class="game-modal">
        <div class="game-modal-content">
            <span class="game-close-button">&times;</span>
            <h2 class="game-title">Tic-Tac-Toe</h2>
            
            <div id="gameStatus">Wähle einen Spielmodus!</div>

            <div id="gameModeSelection" class="game-controls">
                <button id="vsPlayerBtn">Spieler vs. Spieler</button>
                <button id="vsAiBtn">Spieler vs. Computer</button>
            </div>
            
            <div id="ticTacToeBoard" style="display: none;">
                <div class="cell" data-index="0"></div>
                <div class="cell" data-index="1"></div>
                <div class="cell" data-index="2"></div>
                <div class="cell" data-index="3"></div>
                <div class="cell" data-index="4"></div>
                <div class="cell" data-index="5"></div>
                <div class="cell" data-index="6"></div>
                <div class="cell" data-index="7"></div>
                <div class="cell" data-index="8"></div>
            </div>

            <div class="game-controls">
                <button id="resetGameBtn" style="display: none;">Neustart</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Modal Elemente
            const gameModal = document.getElementById('gameModal');
            // NEUER BUTTON zum Öffnen des Spiels aus dem Overlay
            const openModalBtn = document.getElementById('playGameFromOverlayBtn');
            const closeModalBtn = document.querySelector('.game-close-button');

            // Spiel Elemente
            const statusDisplay = document.getElementById('gameStatus');
            const boardElement = document.getElementById('ticTacToeBoard');
            const cells = document.querySelectorAll('.cell');
            const resetBtn = document.getElementById('resetGameBtn');
            const modeSelectionDiv = document.getElementById('gameModeSelection');
            const vsPlayerBtn = document.getElementById('vsPlayerBtn');
            const vsAiBtn = document.getElementById('vsAiBtn');

            // Spiel-Zustand
            let board = ['', '', '', '', '', '', '', '', ''];
            let currentPlayer = 'X';
            let isGameActive = false;
            let gameMode = '';

            const winningConditions = [
                [0, 1, 2], [3, 4, 5], [6, 7, 8],
                [0, 3, 6], [1, 4, 7], [2, 5, 8],
                [0, 4, 8], [2, 4, 6]
            ];
            
            const winningMessage = (player) => `Spieler ${player} hat gewonnen!`;
            const drawMessage = () => `Das Spiel ist unentschieden!`;
            const currentPlayerTurn = (player) => `Spieler ${player} ist am Zug`;

            // ----- Modal-Steuerung -----
            openModalBtn.onclick = () => {
                gameModal.style.display = 'flex';
                resetGame();
            };
            closeModalBtn.onclick = () => gameModal.style.display = 'none';
            // Schließt das Modal, wenn außerhalb geklickt wird
            window.onclick = (event) => {
                if (event.target == gameModal) {
                    gameModal.style.display = 'none';
                }
            };

            // ----- Spielmodus-Auswahl -----
            vsPlayerBtn.onclick = () => startGame('vsPlayer');
            vsAiBtn.onclick = () => startGame('vsAI');

            function startGame(mode) {
                gameMode = mode;
                isGameActive = true;
                modeSelectionDiv.style.display = 'none';
                boardElement.style.display = 'grid';
                resetBtn.style.display = 'inline-block';
                statusDisplay.innerHTML = currentPlayerTurn(currentPlayer);
            }
            
            // ----- Spiellogik -----
            function handleCellPlayed(clickedCell, clickedCellIndex) {
                board[clickedCellIndex] = currentPlayer;
                clickedCell.innerHTML = currentPlayer;
                clickedCell.classList.add(currentPlayer.toLowerCase());
            }

            function changePlayer() {
                currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
                statusDisplay.innerHTML = currentPlayerTurn(currentPlayer);
            }

            function checkResult() {
                let roundWon = false;
                let winningCombo = [];

                for (let i = 0; i < winningConditions.length; i++) {
                    const winCondition = winningConditions[i];
                    const [a, b, c] = [board[winCondition[0]], board[winCondition[1]], board[winCondition[2]]];
                    if (a === '' || b === '' || c === '') continue;
                    if (a === b && b === c) {
                        roundWon = true;
                        winningCombo = winCondition;
                        break;
                    }
                }

                if (roundWon) {
                    statusDisplay.innerHTML = winningMessage(currentPlayer);
                    isGameActive = false;
                    winningCombo.forEach(index => cells[index].classList.add('winning-cell'));
                    return;
                }

                if (!board.includes('')) {
                    statusDisplay.innerHTML = drawMessage();
                    isGameActive = false;
                    return;
                }
                changePlayer();
            }

            function aiMove() {
                if (!isGameActive) return;
                boardElement.style.pointerEvents = 'none';

                setTimeout(() => {
                    let availableCells = board.map((cell, index) => cell === '' ? index : null).filter(val => val !== null);
                    const randomIndex = Math.floor(Math.random() * availableCells.length);
                    const cellIndex = availableCells[randomIndex];
                    const cell = cells[cellIndex];
                    
                    handleCellPlayed(cell, cellIndex);
                    checkResult();
                    
                    if(isGameActive) boardElement.style.pointerEvents = 'auto';
                }, 700);
            }

            function handleCellClick(event) {
                const clickedCell = event.target;
                const clickedCellIndex = parseInt(clickedCell.getAttribute('data-index'));

                if (board[clickedCellIndex] !== '' || !isGameActive) return;

                handleCellPlayed(clickedCell, clickedCellIndex);
                checkResult();

                if (gameMode === 'vsAI' && isGameActive) {
                    aiMove();
                }
            }

            function resetGame() {
                board = ['', '', '', '', '', '', '', '', ''];
                isGameActive = false;
                currentPlayer = 'X';
                
                statusDisplay.innerHTML = 'Wähle einen Spielmodus!';
                modeSelectionDiv.style.display = 'block';
                boardElement.style.display = 'none';
                boardElement.style.pointerEvents = 'auto';
                resetBtn.style.display = 'none';

                cells.forEach(cell => {
                    cell.innerHTML = '';
                    cell.classList.remove('x', 'o', 'winning-cell');
                });
            }

            // ----- Event Listeners -----
            cells.forEach(cell => cell.addEventListener('click', handleCellClick));
            resetBtn.addEventListener('click', resetGame);
        });
    </script>
</body>
</html>
