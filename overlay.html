<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overlay Inhalt</title>
    </head>
<body>

    <div id="myOverlay" class="overlay">
        <div class="overlay-content">
            <span class="close-btn">&times;</span>
            <h2>Willkommen!</h2>
            <p>Dies ist der Inhalt deines Overlays. Du kannst diesen Text und die Schaltflächen anpassen.</p>
            <p>Füge hier beliebigen Text, Bilder oder andere HTML-Elemente ein, die im Overlay erscheinen sollen.</p>
            <div class="buttons">
                <button class="action-btn" id="overlayActionButton1">Mehr erfahren</button>
                <button class="action-btn" id="overlayActionButton2">Schließen</button>
            </div>
        </div>
    </div>

</body>
</html>
