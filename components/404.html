<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 – Seite nicht gefunden | RSE Systems</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="../styles/main.css" />
  <link rel="icon" href="../public/favicon-32x32.png" type="image/png">
</head>
<body>
  <div id="header"></div>
  <div class="stars" id="stars"></div>

  <main class="container">
    <div class="logo-wrapper">
      <img src="../assets/img/RSESystems_Logo.png" alt="RSE Systems Logo" class="logo" />
    </div>
    <h1>404 – Seite nicht gefunden</h1>
    <p>Die angeforderte Seite existiert nicht oder wurde verschoben.</p>
    <a href="/" class="btn">Zur Startseite</a>
  </main>

  <div id="footer"></div>

  <script>
    fetch("../components/header.html")
      .then(res => res.text())
      .then(data => document.getElementById("header").innerHTML = data)
      .catch(console.error);

    fetch("../components/footer.html")
      .then(res => res.text())
      .then(data => document.getElementById("footer").innerHTML = data)
      .catch(console.error);
  </script>
</body>
</html>
