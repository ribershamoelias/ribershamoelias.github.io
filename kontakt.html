<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kontakt – RSE Systems</title>
  <meta name="description" content="Kontaktieren Sie RSE Systems für Softwareentwicklung, Beratung und digitale Lösungen. Wir freuen uns auf Ihre Nachricht.">
  <meta name="keywords" content="Kontakt, RSE Systems, Softwarefirma, Anfrage, Webentwicklung, Trier">
  <meta name="author" content="RSE Systems">
  <link rel="icon" href="./public/favicon-32x32.png" type="image/png">
  <link rel="stylesheet" href="./styles/main.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <!-- Übersetzungen -->
  <script src="./scripts/translations.js"></script>
  <script src="./scripts/main.js"></script>
</head>
<body>
  <div id="header"></div>

  <main class="container">
    <h1>Kontakt</h1>
    <p>Sie haben Fragen oder ein Projekt? Schreiben Sie uns – wir antworten schnellstmöglich.</p>

    <form name="contact" method="POST" data-netlify="true">
      <input type="hidden" name="form-name" value="contact">
      <p>
        <label>Name:<br><input type="text" name="name" required></label>
      </p>
      <p>
        <label>E-Mail:<br><input type="email" name="email" required></label>
      </p>
      <p>
        <label>Nachricht:<br><textarea name="message" rows="5" required></textarea></label>
      </p>
      <p><button type="submit">Absenden</button></p>
    </form>
  </main>

  <div id="footer"></div>

  <script src="./scripts/main.js" defer></script>
  <script>
    fetch("./components/header.html").then(res => res.text()).then(data => document.getElementById("header").innerHTML = data);
    fetch("./components/footer.html").then(res => res.text()).then(data => document.getElementById("footer").innerHTML = data);
  </script>
</body>
</html>
