<!DOCTYPE html>
<html lang="de">
<head>
  <title>Kontakt – RSE Systems</title>
  <meta name="description" content="Nehmen Sie Kontakt mit uns auf für Ihre individuellen Softwarelösungen und Projekte.">
  <link rel="canonical" href="https://rse-systems.com/de/kontakt.html" />
  <link rel="alternate" hreflang="de" href="https://rse-systems.com/de/kontakt.html" />
  <link rel="alternate" hreflang="en" href="https://rse-systems.com/en/contact.html" />
  <link rel="alternate" hreflang="fr" href="https://rse-systems.com/fr/contact.html" />
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../styles/main.css">
  <link rel="icon" href="./public/favicon-32x32.png" type="image/png">
</head>

<body>
  <div id="header"></div>
  <div class="stars" id="stars"></div>

  <main class="container">
    <h1 id="contactHeadline">Kontaktieren Sie uns</h1>
    <p id="contactIntro">
      Schreiben Sie uns bei Fragen, Ideen oder Projektanfragen. Wir melden uns schnellstmöglich zurück.
    </p>
    <form action="../de/danke.html" method="POST">
      <label for="name" id="contactLabelName">Ihr Name:</label>
      <input type="text" name="name" id="name" required>

      <label for="email" id="contactLabelEmail">Ihre E-Mail-Adresse:</label>
      <input type="email" name="email" id="email" required>

      <label for="message" id="contactLabelMessage">Nachricht:</label>
      <textarea name="message" id="message" rows="6" required></textarea>

      <button type="submit" id="contactButton">Absenden</button>
    </form>
  </main>

  <div id="footer"></div>
  <div id="cookie-banner"></div>

  <script src="../scripts/main.js" type="module"></script>
</body>
</html>
