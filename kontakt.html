<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kontakt – RSE Systems</title>
  <meta name="description" content="Kontaktieren Sie RSE Systems für moderne Softwarelösungen und digitale Beratung. Wir freuen uns auf Ihre Nachricht.">
  <link rel="icon" href="./public/favicon-32x32.png" type="image/png" />
  <link rel="stylesheet" href="./styles/main.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- Header -->
  <div id="header"></div>

  <!-- Hintergrund -->
  <div class="stars" id="stars"></div>

  <!-- Kontaktformular -->
  <main class="container">
    <div class="logo-wrapper">
      <img src="./assets/img/RSESystems_Logo.png" alt="RSE Systems Logo" class="logo" />
    </div>

    <h1>Kontaktieren Sie uns</h1>
    <p>Fragen? Ideen? Projektstart? Schreiben Sie uns – wir melden uns zeitnah zurück!</p>

    <form name="Kontaktformular" method="POST" data-netlify="true" style="max-width: 500px; margin: 2rem auto; text-align: left;">
      <input type="hidden" name="form-name" value="Kontaktformular" />
      
      <label for="name">Name</label>
      <input type="text" name="name" id="name" required />

      <label for="email">E-Mail</label>
      <input type="email" name="email" id="email" required />

      <label for="nachricht">Nachricht</label>
      <textarea name="nachricht" id="nachricht" rows="5" required></textarea>

      <label class="checkbox">
        <input type="checkbox" required />
        Ich akzeptiere die <a href="./datenschutz.html" target="_blank">Datenschutzerklärung</a>.
      </label>

      <button type="submit">Absenden</button>
    </form>
  </main>

  <!-- Footer -->
  <div id="footer"></div>

  <!-- Scripts -->
  <script src="./scripts/main.js" defer></script>
  <script>
    fetch("./components/header.html")
      .then(res => res.text())
      .then(data => document.getElementById("header").innerHTML = data);

    fetch("./components/footer.html")
      .then(res => res.text())
      .then(data => document.getElementById("footer").innerHTML = data);
  </script>

</body>
</html>
